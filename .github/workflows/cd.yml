name: Deploy API

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - "infrastructure/**"
      - ".github/workflows/cd.yaml"
      - "package.json"
      - "package-lock.json"

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API typecheck
        run: npm run typecheck:api

      - name: Run API tests
        run: npm run test:api

      - name: Set up AWS SAM
        uses: aws-actions/setup-sam@v2

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: "arn:aws:iam::989142031676:role/aws-sam-cli-managed-productio-PipelineExecutionRole-QvwlwjlZBvz5"
          aws-region: eu-north-1

      - name: Build API
        run: sam build --template-file infrastructure/template.yaml

      - name: Deploy API
        run: >
          sam deploy
          --template-file .aws-sam/build/template.yaml
          --stack-name cloud-integration-sandbox
          --region eu-north-1
          --s3-bucket "aws-sam-cli-managed-production-pip-artifactsbucket-vicwhlsln89i"
          --capabilities CAPABILITY_IAM
          --role-arn "arn:aws:iam::989142031676:role/aws-sam-cli-managed-produ-CloudFormationExecutionRo-fiyo47szxEx0"
          --no-confirm-changeset
          --no-fail-on-empty-changeset
